services:
  yagura:
    image: ghcr.io/latoulicious/yagura:latest
    container_name: yagura
    restart: unless-stopped
    # Host network so drift TCP probes reach host-local services (127.0.0.1:9000 etc.)
    # Set YAGURA_BIND=127.0.0.1:3001 in .env — default 8080 conflicts with lazyscan.
    network_mode: host
    # Runtime config (alerts + P4). Optional — compose runs without a .env present.
    env_file:
      - path: .env
        required: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # route-drift reads the tunnel config (read-only).
      - /etc/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - yagura-data:/data

volumes:
  yagura-data:
