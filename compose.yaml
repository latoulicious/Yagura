services:
  yagura:
    image: ghcr.io/latoulicious/yagura:latest
    container_name: yagura
    restart: unless-stopped
    # Loopback-only; the Cloudflare Tunnel reaches it. 8080/8090 are dozzle/Tsugi.
    ports:
      - "127.0.0.1:8091:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - yagura-data:/data

volumes:
  yagura-data:
