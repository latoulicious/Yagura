services:
  yagura:
    image: ghcr.io/latoulicious/yagura:latest
    container_name: yagura
    restart: unless-stopped
    # Loopback-only; the Cloudflare Tunnel reaches it. 3001 (ex-Kuma), 8080 left for lazyscan.
    ports:
      - "127.0.0.1:3001:8080"
    # Runtime config (alerts + P4). Optional — compose runs without a .env present.
    env_file:
      - path: .env
        required: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # route-drift reads the tunnel config (read-only).
      - /etc/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - yagura-data:/data

volumes:
  yagura-data:
